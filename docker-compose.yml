services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maji_backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # Optional: mount database.json for persistence across container restarts
    volumes:
      - maji_db:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: maji_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  maji_db:
