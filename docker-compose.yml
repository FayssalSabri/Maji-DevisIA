version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maji_backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    # Optional: mount database.json for persistence across container restarts
    volumes:
      - maji_db:/app/
    restart: unless-stopped

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: maji_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  maji_db:
